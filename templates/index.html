<!DOCTYPE html>
<html>
<head>
  <title>Anthoscope</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">
  <style>
    /* --- Styles Preserved Exactly --- */
    * { cursor: url('/static/cursor.png'), auto !important; box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Montserrat', sans-serif; }
    #map { height: 100%; width: 100%; }
    
    .glass-panel {
      background: rgba(255, 0, 114, 0.15); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 0, 114, 0.5); border-radius: 10px; box-shadow: 0 0 8px rgba(0,0,0,0.3);
      z-index: 1000; position: absolute;
    }

    #controls { top: 20px; left: 20px; padding: 22px; width: 375px; max-width: 90vw; }
    #controls label { display: block; margin-top: 10px; margin-bottom: 5px; font-weight: bold; font-size: 21px; }
    #controls select { padding: 8px; width: 100%; font-size: 21px; border: 1px solid #ccc; border-radius: 4px; }
    #controls button { margin-top: 15px; padding: 15px; width: 100%; background: rgba(200, 0, 90, 0.8); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 21px; font-weight: bold; }
    
    #forecast-info { top: 20px; right: 20px; padding: 22px; width: 450px; max-height: 80vh; overflow-y: auto; display: none; }
    .close-forecast { float: right; cursor: pointer; font-weight: bold; color: white; background: rgba(200, 0, 90, 0.8); border-radius: 50%; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; font-size: 14px; }

    #search-box-container { top: 20px; left: 50%; transform: translateX(-50%); width: 500px; max-width: 80%; padding: 10px; }
    #search-box { width: 100%; padding: 15px; font-size: 18px; border-radius: 8px; border: 1px solid rgba(255, 0, 114, 0.5); background: white; }
    #search-results { position: absolute; top: 100%; left: 10px; right: 10px; background: white; max-height: 300px; overflow-y: auto; display: none; border-radius: 0 0 8px 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .search-result-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; color: #333; }
    .search-error { padding: 15px; color: #ff0000; font-size: 15px; font-weight: bold; }

    #legend { bottom: 20px; left: 20px; padding: 15px; font-size: 18px; line-height: 1.4; }
    .legend-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }

    #external-logo-link { position: absolute; bottom: 15px; left: 280px; z-index: 1000; }
    .clickable-logo { width: 80px; border-radius: 8px; }

    @media (max-width: 768px) {
      #controls { top: auto; bottom: 10px; left: 5%; width: 90%; padding: 10px; font-size: 16px; display: flex; flex-wrap: wrap; gap: 5px; }
      #controls label, #controls strong { display: none; }
      #controls select, #controls button { flex: 1 1 45%; font-size: 14px; margin: 0; padding: 8px; }
      #forecast-info { top: 70px; left: 5%; right: 5%; width: 90%; max-height: 50vh; }
      #search-box-container { top: 10px; width: 90%; }
      #legend { display: none; }
      #external-logo-link { left: auto; right: 20px; bottom: 110px; }
    }

    .forecast-day { margin: 10px 0; padding: 15px; border-left: 4px solid #c8005a; background: rgba(255,255,255,0.95); border-radius: 4px; }
    .pollen-level { display: inline-block; padding: 3px 10px; border-radius: 4px; margin: 2px; font-size: 14px; font-weight: bold; }
    .level-0 { background: #e8e8e8; color: #666; }
    .level-1 { background: #c3f0c3; color: #2d5016; }
    .level-2 { background: #fff59d; color: #5d4e00; }
    .level-3 { background: #ffcc80; color: #663c00; }
    .level-4 { background: #ff8a65; color: #5d1700; }
    .level-5 { background: #ef5350; color: white; }
    .species-toggle { background: #c8005a; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 12px; margin-top: 8px; cursor: pointer; }
    .species-breakdown { display: none; margin-top: 10px; border-top: 1px solid #ddd; padding-top: 10px; }
    .species-breakdown.show { display: block; }
    .health-advice { font-size: 13px; color: #555; margin-top: 5px; font-style: italic; }

    #review-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
    #review-modal.active { display: flex; }
    .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    
    .custom-infowindow { font-family: 'Montserrat', sans-serif; padding: 15px; min-width: 250px; }
    .infowindow-header { color: #c8005a; font-weight: bold; border-bottom: 2px solid #ff0072; margin-bottom: 10px; padding-bottom: 5px; font-size: 18px; }
  </style>

  <script async defer src="https://maps.googleapis.com/maps/api/js?key={{ google_api_key }}&callback=initMap&libraries=drawing,places"></script>
</head>
<body>

  <div id="search-box-container" class="glass-panel">
    <input id="search-box" type="text" placeholder="Search for a location..." autocomplete="off">
    <div id="search-results"></div>
  </div>
  
  <div id="controls" class="glass-panel">
    <strong>Pollen Heatmap</strong>
    <select id="regionSelect">
      <option value="europe">🇪🇺 Europe</option>
      <option value="usa">🇺🇸 USA</option>
      <option value="japan">🇯🇵 Japan</option>
      <option value="australia">🇦🇺 Australia</option>
    </select>
    <label>Pollen Type</label>
    <select id="pollenType">
      <option value="TREE_UPI">Tree Pollen</option>
      <option value="GRASS_UPI">Grass Pollen</option>
      <option value="WEED_UPI">Weed Pollen</option>
    </select>
    <button id="drawAreaBtn">Draw Area & Review</button>
  </div>
  
  <div id="forecast-info" class="glass-panel">
    <div class="close-forecast" onclick="closeForecast()">✕</div>
    <strong id="forecast-title" style="font-size:21px;">5-Day Forecast</strong>
    <div id="forecast-content">Click on the map...</div>
  </div>
  
  <div id="map"></div>
  
  <div id="legend" class="glass-panel">
    <strong>Pollen Index (UPI)</strong><br>
    <div><span class="legend-dot" style="background:#e8e8e8;"></span> 0 - None</div>
    <div><span class="legend-dot" style="background:#c3f0c3;"></span> 1 - Very Low</div>
    <div><span class="legend-dot" style="background:#fff59d;"></span> 2 - Low</div>
    <div><span class="legend-dot" style="background:#ffcc80;"></span> 3 - Moderate</div>
    <div><span class="legend-dot" style="background:#ff8a65;"></span> 4 - High</div>
    <div><span class="legend-dot" style="background:#ef5350;"></span> 5 - Very High</div>
  </div>

  <a id="external-logo-link" href="#" target="_blank">
    <img src="/static/mini.png" class="clickable-logo" alt="Anthoscope">
  </a>

  <div id="review-modal">
    <div class="modal-content">
      <h2 style="color:#c8005a; margin-top:0;">New Allergy Review</h2>
      <div id="area-info" style="margin-bottom:15px; font-size:14px; color:#666; background:#f9f9f9; padding:10px; border-radius:5px;"></div>
      
      <label style="display:block; margin-bottom:5px; font-weight:bold;">Pollen Allergy Type:</label>
      <select id="rev-type" style="width:100%; padding:10px; margin-bottom:15px;">
        <option value="Tree">Tree Pollen</option>
        <option value="Grass">Grass Pollen</option>
        <option value="Weed">Weed Pollen</option>
      </select>
      
      <label style="display:block; margin-bottom:5px; font-weight:bold;">Severity:</label>
      <select id="rev-sev" style="width:100%; padding:10px; margin-bottom:15px;">
        <option value="Mild">Mild</option>
        <option value="Moderate">Moderate</option>
        <option value="Severe">Severe</option>
      </select>

      <label style="display:block; margin-bottom:5px; font-weight:bold;">Comments:</label>
      <textarea id="rev-text" style="width:100%; height:80px; padding:10px; margin-bottom:15px; border:1px solid #ccc;"></textarea>
      
      <div style="display:flex; gap:10px;">
        <button onclick="closeReviewModal()" style="flex:1; padding:12px; background:#eee; border:none; border-radius:5px;">Cancel</button>
        <button onclick="submitReview()" style="flex:1; padding:12px; background:#c8005a; color:white; border:none; border-radius:5px; font-weight:bold;">Submit Review</button>
      </div>
    </div>
  </div>

  <script>
    const GOOGLE_KEY = "{{ google_api_key }}";
    const FORECAST_API = "https://pollen.googleapis.com/v1/forecast:lookup";

    const REGIONS = {
      europe: { center: { lat: 51.0, lng: 10.0 }, zoom: 5, bounds: { south: 30.0, west: -25.0, north: 72.0, east: 45.0 } },
      usa: { center: { lat: 37.0, lng: -96.0 }, zoom: 4, bounds: { south: 24.0, west: -125.0, north: 49.0, east: -66.0 } },
      japan: { center: { lat: 37.0, lng: 138.0 }, zoom: 5, bounds: { south: 20.4, west: 122.9, north: 45.5, east: 154.0 } },
      australia: { center: { lat: -27.0, lng: 133.0 }, zoom: 4, bounds: { south: -43.6, west: 112.9, north: -10.7, east: 153.6 } }
    };

    let map, drawingManager, currentCircle, isDrawingMode = false;
    let markers = [];

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: REGIONS.europe.center, zoom: 5,
        mapTypeControl: false, streetViewControl: false, fullscreenControl: false
      });

      updatePollenOverlay('TREE_UPI');
      setRegion('europe'); 
      loadReviews();
      initSearch();

      map.addListener('click', (e) => { if (!isDrawingMode) showForecast(e.latLng.lat(), e.latLng.lng()); });

      drawingManager = new google.maps.drawing.DrawingManager({
        drawingMode: null, drawingControl: false,
        circleOptions: { fillColor: 'rgba(200, 0, 90, 0.4)', fillOpacity: 0.3, strokeWeight: 2, strokeColor: '#c8005a' }
      });
      drawingManager.setMap(map);

      google.maps.event.addListener(drawingManager, 'circlecomplete', (circle) => {
        if (currentCircle) currentCircle.setMap(null);
        currentCircle = circle;
        toggleDrawingMode();
        openReviewModal();
      });

      document.getElementById('regionSelect').addEventListener('change', (e) => setRegion(e.target.value));
      document.getElementById('pollenType').addEventListener('change', (e) => updatePollenOverlay(e.target.value));
      document.getElementById('drawAreaBtn').addEventListener('click', toggleDrawingMode);
    }

    function setRegion(key) {
      const r = REGIONS[key];
      const bounds = new google.maps.LatLngBounds({lat: r.bounds.south, lng: r.bounds.west}, {lat: r.bounds.north, lng: r.bounds.east});
      
      // Temporarily remove restriction for smooth transition
      map.setOptions({ restriction: null }); 
      map.panTo(r.center); 
      map.setZoom(r.zoom);
      
      // Re-apply after small delay to ensure center takes effect
      setTimeout(() => {
        map.setOptions({ restriction: { latLngBounds: bounds, strictBounds: true } });
      }, 500);

      document.getElementById('regionSelect').value = key;
    }

    function updatePollenOverlay(type) {
      map.overlayMapTypes.clear();
      const overlay = new google.maps.ImageMapType({
        getTileUrl: (coord, zoom) => `https://pollen.googleapis.com/v1/mapTypes/${type}/heatmapTiles/${zoom}/${coord.x}/${coord.y}?key=${GOOGLE_KEY}`,
        tileSize: new google.maps.Size(256, 256), opacity: 0.6
      });
      map.overlayMapTypes.push(overlay);
    }

    function getHealthAdvice(upi, code) {
      const base = {
        0: "No symptoms expected.",
        1: "Symptoms unlikely. Sensitive individuals may notice mild irritation.",
        2: "Minor symptoms possible. Keep windows closed at night.",
        3: "Noticeable symptoms likely. Limit outdoor exercise.",
        4: "Strong symptoms for most individuals. Wear a mask outdoors.",
        5: "Severe symptoms expected. Stay indoors as much as possible."
      }[upi] || "";
      const extra = {
        BIRCH: " Morning peaks common.", RAGWEED: " Avoid outdoor running 5-10 AM.", 
        GRAMINALES: " Avoid freshly mowed lawns.", JAPANESE_CEDAR: " Wear a mask during peak."
      }[code] || "";
      return base + " " + extra;
    }

    async function showForecast(lat, lng) {
      const info = document.getElementById('forecast-info');
      const content = document.getElementById('forecast-content');
      info.style.display = 'block';
      content.innerHTML = "Loading analytics...";

      try {
        const res = await fetch(`${FORECAST_API}?key=${GOOGLE_KEY}&location.latitude=${lat}&location.longitude=${lng}&days=5`);
        const data = await res.json();
        if (!data.dailyInfo) { content.innerHTML = "No data."; return; }

        let html = "";
        data.dailyInfo.forEach((day, i) => {
          const date = new Date(day.date.year, day.date.month-1, day.date.day).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
          html += `<div class="forecast-day"><strong>${i === 0 ? 'Today' : date}</strong><br>`;
          day.pollenTypeInfo.forEach(p => {
            html += `<span class="pollen-level level-${p.indexInfo?.value || 0}">${p.displayName}: ${p.indexInfo?.category || 'None'}</span>`;
          });
          if (day.plantInfo) {
            html += `<button class="species-toggle" onclick="this.nextElementSibling.classList.toggle('show')">Analytical Breakdown</button>
                     <div class="species-breakdown">`;
            day.plantInfo.forEach(s => {
              const v = s.indexInfo?.value || 0;
              html += `<div style="margin-top:5px;"><span class="pollen-level level-${v}">${s.displayName}</span>
                       <div class="health-advice">${getHealthAdvice(v, s.code)}</div></div>`;
            });
            html += `</div>`;
          }
          html += `</div>`;
        });
        content.innerHTML = html;
      } catch (err) { content.innerHTML = "Error loading forecast."; }
    }

    function closeForecast() { document.getElementById('forecast-info').style.display = 'none'; }

    function isInside(lat, lng, bounds) {
      return lat >= bounds.south && lat <= bounds.north && lng >= bounds.west && lng <= bounds.east;
    }

    function initSearch() {
      const input = document.getElementById('search-box');
      const resDiv = document.getElementById('search-results');
      const svc = new google.maps.places.AutocompleteService();
      const geo = new google.maps.Geocoder();

      input.addEventListener('input', () => {
        if (input.value.length < 2) { resDiv.style.display = 'none'; return; }
        svc.getPlacePredictions({ input: input.value, types: ['geocode'] }, (preds) => {
          resDiv.innerHTML = ''; resDiv.style.display = 'block';
          preds?.forEach(p => {
            const d = document.createElement('div'); d.className = 'search-result-item'; d.innerText = p.description;
            d.onclick = () => {
              geo.geocode({ placeId: p.place_id }, (results) => {
                const loc = results[0].geometry.location;
                const lat = loc.lat(), lng = loc.lng();
                
                let targetRegion = null;
                for (let key in REGIONS) {
                  if (isInside(lat, lng, REGIONS[key].bounds)) { targetRegion = key; break; }
                }

                if (targetRegion) {
                  // Important: Fully disable restriction to allow precise movement
                  map.setOptions({ restriction: null });
                  setRegion(targetRegion);
                  
                  // Forced move after a brief frame to clear internal restriction logic
                  setTimeout(() => {
                    map.panTo(loc);
                    map.setZoom(13);
                    showForecast(lat, lng);
                  }, 100);

                  resDiv.style.display = 'none';
                  input.value = p.description;
                } else {
                  resDiv.innerHTML = `<div class="search-error">⚠️ This location is not supported from Anthoscope yet.</div>`;
                }
              });
            };
            resDiv.appendChild(d);
          });
        });
      });
    }

    async function loadReviews() {
      markers.forEach(m => m.setMap(null)); markers = [];
      try {
        const res = await fetch('/api/reviews');
        const data = await res.json();
        if (data.success) {
          data.reviews.forEach(r => {
            const marker = new google.maps.Marker({ position: { lat: r.center_lat, lng: r.center_lng }, map: map, icon: { url: '/static/point.png', scaledSize: new google.maps.Size(40, 40) } });
            marker.addListener('click', () => {
              new google.maps.InfoWindow({
                content: `<div class="custom-infowindow"><div class="infowindow-header">Allergy Review</div>
                          <div><b>Loc:</b> ${r.center_lat.toFixed(4)}, ${r.center_lng.toFixed(4)}</div>
                          <div><b>Radius:</b> ${r.radius_km.toFixed(2)} km</div>
                          <div style="margin-top:5px; font-style:italic;">"${r.review_text}"</div></div>`
              }).open(map, marker);
            });
            markers.push(marker);
          });
        }
      } catch (e) {}
    }

    async function submitReview() {
      const payload = {
        centerLat: currentCircle.getCenter().lat(), centerLng: currentCircle.getCenter().lng(),
        radiusKm: currentCircle.getRadius() / 1000, pollenType: document.getElementById('rev-type').value,
        severity: document.getElementById('rev-sev').value, reviewText: document.getElementById('rev-text').value, symptoms: []
      };
      const res = await fetch('/api/reviews', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      const result = await res.json();
      if (result.success) { closeReviewModal(); loadReviews(); }
    }

    function openReviewModal() {
      const c = currentCircle.getCenter();
      document.getElementById('area-info').innerHTML = `<b>Loc:</b> ${c.lat().toFixed(4)}, ${c.lng().toFixed(4)} | <b>Radius:</b> ${(currentCircle.getRadius()/1000).toFixed(2)}km`;
      document.getElementById('review-modal').classList.add('active');
    }
    function closeReviewModal() { document.getElementById('review-modal').classList.remove('active'); if (currentCircle) currentCircle.setMap(null); }
    function toggleDrawingMode() { isDrawingMode = !isDrawingMode; drawingManager.setDrawingMode(isDrawingMode ? google.maps.drawing.OverlayType.CIRCLE : null); document.getElementById('drawAreaBtn').textContent = isDrawingMode ? "Cancel Drawing" : "Draw Area & Review"; }
  </script>
</body>
</html>
