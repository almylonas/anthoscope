<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Anthoscope • Pollen Inspector</title>
  
  <link rel="icon" type="image/x-icon" href="static/anthologo-neg.ico">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      height: 100vh; 
      background: #0a1a1f; 
      color: white; 
      overflow: hidden; 
    }

    /* Pinkish Map Design */
    #map { 
      height: 100%; 
      width: 100%; 
      z-index: 1; 
      background: #1a0a14;
      filter: hue-rotate(300deg) brightness(1.2) saturate(1.8) contrast(1.1);
    }
    
    /* Logo: Large, No Tile Background, Top Left */
    #logo-container {
      position: absolute;
      top: 25px;
      left: 20px;
      width: 300px;
      z-index: 1000;
      pointer-events: none;
    }
    
    #logo-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Glass-card design */
    .glass-card {
      background: rgba(15, 25, 35, 0.9); 
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 20px; 
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4); 
      z-index: 1000; 
      position: absolute;
    }
    
    /* Spacing between Logo and Data Tile */
    #pollen-report {
      top: 150px; /* Space added between logo and tile */
      left: 20px; 
      width: 300px; 
      padding: 20px;
      display: none; 
      transition: all 0.3s ease;
    }

    .pollen-item {
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      padding: 10px 0; 
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .pollen-item:last-child { border: none; }
    
    .pollen-label { font-weight: 600; font-size: 0.9rem; }
    .pollen-val { font-family: monospace; font-size: 1rem; color: #ffb7cc; }
    
    /* Category Tags */
    .tag {
      padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; margin-left: 10px;
    }
    .tag-low { background: #c8e6c9; color: #1b5e20; }
    .tag-mod { background: #fff9c4; color: #f57f17; }
    .tag-high { background: #ef5350; color: #fff; }

    .hint { 
      position: absolute; 
      bottom: 30px; 
      left: 50%; 
      transform: translateX(-50%); 
      background: rgba(0,0,0,0.6); 
      padding: 10px 25px; 
      border-radius: 30px; 
      font-size: 0.85rem; 
      z-index: 1000; 
      pointer-events: none;
      color: #ffb7cc;
      border: 1px solid rgba(255, 77, 122, 0.2);
    }
  </style>
</head>
<body>

  <div id="logo-container">
    <img src="static/anthologo_neg.png" alt="Anthoscope">
  </div>

  <div id="pollen-report" class="glass-card">
    <h2 id="report-loc" style="font-size: 0.8rem; color: #ff4d7a; margin-bottom: 15px; font-weight: 700;">LOCATION DETAILS</h2>
    <div id="pollen-list"></div>
    <p style="font-size: 0.6rem; color: #888; margin-top: 15px;">Source: Open-Meteo Air Quality (CAMS)</p>
  </div>

  <div class="hint">📍 Tap anywhere on the map to inspect pollen levels</div>

  <div id="map"></div>

  <script>
    let map, marker;

    // Custom Pink Marker Icon
    const pinkIcon = L.divIcon({
      className: 'custom-pink-pin',
      html: `<svg width="30" height="42" viewBox="0 0 30 42" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M15 0C6.71573 0 0 6.71573 0 15C0 26.25 15 42 15 42C15 42 30 26.25 30 15C30 6.71573 23.2843 0 15 0ZM15 20.25C12.1005 20.25 9.75 17.8995 9.75 15C9.75 12.1005 12.1005 9.75 15 9.75C17.8995 9.75 20.25 12.1005 20.25 15C20.25 17.8995 17.8995 20.25 15 20.25Z" fill="#ff4d7a"/>
             </svg>`,
      iconSize: [30, 42],
      iconAnchor: [15, 42]
    });

    function initMap() {
      map = L.map('map', { 
        zoomControl: false,
        attributionControl: false 
      }).setView([48.85, 2.35], 5);
      
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
      }).addTo(map);

      map.on('click', onMapClick);
    }

    async function onMapClick(e) {
      const { lat, lng } = e.latlng;
      const reportDiv = document.getElementById('pollen-report');
      const listDiv = document.getElementById('pollen-list');
      
      reportDiv.style.display = 'block';
      document.getElementById('report-loc').innerText = `LAT: ${lat.toFixed(3)} | LNG: ${lng.toFixed(3)}`;
      listDiv.innerHTML = '<p style="padding:15px; text-align:center; font-size:0.8rem; color:#ffb7cc;">Loading data...</p>';

      // Use the pinkIcon for the marker
      if (marker) {
        marker.setLatLng(e.latlng);
      } else {
        marker = L.marker(e.latlng, { icon: pinkIcon }).addTo(map);
      }

      const types = ['birch_pollen', 'grass_pollen', 'ragweed_pollen', 'alder_pollen', 'mugwort_pollen'];
      const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lng}&current=${types.join(',')}`;

      try {
        const resp = await fetch(url);
        const data = await resp.json();
        if (!data.current) throw new Error();

        listDiv.innerHTML = '';
        types.forEach(type => {
          const val = data.current[type] || 0;
          const { label, categoryClass, categoryText } = getPollenCategory(type, val);
          
          const item = document.createElement('div');
          item.className = 'pollen-item';
          item.innerHTML = `
            <div>
              <span class="pollen-label">${label}</span>
              <span class="tag ${categoryClass}">${categoryText}</span>
            </div>
            <span class="pollen-val">${Math.round(val)}</span>
          `;
          listDiv.appendChild(item);
        });
      } catch (err) {
        listDiv.innerHTML = '<p style="color:#ef5350; font-size:0.8rem; text-align:center; padding:10px;">⚠️ No data available.</p>';
      }
    }

    function getPollenCategory(type, val) {
      const labels = {
        birch_pollen: "🌳 Birch",
        grass_pollen: "🌿 Grass",
        ragweed_pollen: "🌼 Ragweed",
        alder_pollen: "🌲 Alder",
        mugwort_pollen: "🌱 Mugwort"
      };
      let categoryClass = 'tag-low';
      let categoryText = 'Low';
      if (val > 30 && val <= 80) {
        categoryClass = 'tag-mod';
        categoryText = 'Mod';
      } else if (val > 80) {
        categoryClass = 'tag-high';
        categoryText = 'High';
      }
      return { label: labels[type], categoryClass, categoryText };
    }

    window.onload = initMap;
  </script>
</body>
</html>
